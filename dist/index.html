  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IS(One Stop) - Volcanic Supply Chain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'media',
        theme: {
          extend: {
            colors: {
              background: 'var(--background)',
              foreground: 'var(--text)',
              subtext: 'var(--subtext)',
              card: 'var(--card-bg)',
              'card-border': 'var(--card-border)',
              'brand-primary': 'var(--brand-primary)',     /* Magma Orange */
              'brand-secondary': 'var(--brand-secondary)', /* Light Magma */
              'brand-destructive': 'var(--brand-destructive)', /* Deep Magma */
            },
            backgroundImage: {
              'highlight-gradient': 'var(--highlight-gradient)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Vibrant Volcanic Orange Theme (No Gold) */
        --brand-primary: #FF8C00; /* Dark Orange / Magma */
        --brand-secondary: #FFA726; /* Orange 400 - Light Magma (Replaces Gold) */
        --brand-destructive: #E65100; /* Orange 900 - Deep Magma (Alerts) */
        
        --highlight-gradient: linear-gradient(135deg, #FF8C00 0%, #FFB74D 100%);
        
        /* Light Mode */
        --background: #FFF3E0; /* Orange 50 - Very light warm tint */
        --text: #212121;
        --subtext: #5D4037;
        --card-bg: #FFFFFF;
        --card-border: #FFCC80;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* Dark Mode - Basalt Black & Glowing Magma */
          --background: #121212; /* Basalt Black */
          --text: #FFF3E0;
          --subtext: #BCAAA4;
          --card-bg: #1E1E1E;
          --card-border: #3E2723;
        }
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--background);
        color: var(--text);
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .transition-theme {
        transition: all 0.3s ease;
      }
      
      /* Scrollbar styling for that lava feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--background); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--brand-primary); 
        border-radius: 4px;
      }
    </style>
